  Title: Nabízíme výrobu řetězových kol
  Text1: Vyrábíme přesná řetězová kola na míru podle výkresové dokumentace i dle vzorku. Zajistíme kvalitní materiál, přesné opracování a kontrolu každého kusu.
  Text2: Řetězová kola dodáváme v krátkých termínech, včetně možnosti kusové i malovýrobní série. Pro individuální poptávku nás kontaktujte – rádi poradíme s technickým řešením.
  ImageUrl: news/a0747b4c7ec14ce98120d528f4488ea1_r.webp
- Id: 58777693-4410-4da8-883b-576dc00ca7dd
  Title: Zajistíme i výrobu modulárního ozubení
  Text1: Vyrábíme modulární ozubení podle výkresů i dle dodaného vzorku. Precizní obrábění a přesná geometrie zajišťují tichý chod a dlouhou životnost převodů.
  Text2: Ozubení dodáváme kusově i v menších sériích, v krátkých termínech a s možností individuálních úprav. Pro konkrétní poptávku nás neváhejte kontaktovat.
  ImageUrl: news/813c216cd8e9454f9e5d958c5ad4fe4d_r.jpeg
