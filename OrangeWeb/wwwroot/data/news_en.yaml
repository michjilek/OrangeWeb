- Id: 992cbc91-2297-41bb-8c5a-44a593d37e84
  Title: We also provide production of modular gearing
  Text1: We produce modular gearing according to technical drawings or supplied samples. Precise machining and accurate geometry ensure quiet operation and long service life of the gear systems.
  Text2: We supply gearing as single pieces and in small series, with short lead times and the option of individual customisation. For specific enquiries, please do not hesitate to contact us.
