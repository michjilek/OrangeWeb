- Id: About_us_text_1
  Translation: I am an experienced CNC programmer and operator specialising in turning and milling. I offer precise, high-quality machined parts according to your technical drawings.
- Id: About_us_text_2
  Translation: Thanks to my many years of experience and modern technologies, I guarantee high accuracy and reliability.
- Id: About_us_text_3
  Translation: If you are looking for a partner for small-batch production in the field of CNC turning and milling, do not hesitate to contact me.
- Id: About_us_text_4
  Translation: Get in touch – I will be happy to discuss your project with you in person.
