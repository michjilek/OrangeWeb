- Id: Topic_1_Title_1
  Translation: Ukázka naší práce
- Id: Topic_1_Title_2
  Translation: „Kvalita bez kompromisů, dodání bez prodlení.“
- Id: Topic_1_Title_3
  Translation: Všechny hrany jsou čistě sražené, bez otřepů a stop po obrábění, závit je souměrný, s rovnoměrnou hloubkou po celé délce. Lesklý povrch ukazuje na kvalitní nástrojové obrábění a správně zvolenou technologii – díl je připravený k okamžitému použití v provozu
- Id: Topic_1_Text_1
  Translation: Dílec je vhodný pro použití například ve strojírenství, hydraulice, pneumatice nebo v oblasti zakázkové výroby, kde je potřeba spolehlivé a přesné závitové spojení
- Id: Topic_1_Text_2
  Translation: Kdo hledá poctivě vyrobený díl s důrazem na detail, u nás ho určitě najde
