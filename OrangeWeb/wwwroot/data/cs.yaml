- Id: About_us_text_1
  Translation: >2-

    Jsem zkušený CNC programátor a operátor specializující se na soustružení a frézování. Nabízím precizní a kvalitní obráběné dílce dle výkresové dokumentace.
- Id: About_us_text_2
  Translation: 'Díky mým dlouholetým zkušenostem a moderním technologiím garantuji vysokou přesnost a spolehlivost. '
- Id: About_us_text_3
  Translation: Pokud hledáte partnera malokusové výroby v oblasti CNC soustružení a frézování, neváhejte mě kontaktovat.
- Id: About_us_text_4
  Translation: Ozvěte se, rád s vámi proberu váš projekt osobně.
